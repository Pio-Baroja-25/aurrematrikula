<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pio Baroja</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Tahoma';
      src: url('tahoma.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-image: url("fondo2.jpg");
      background-repeat: no-repeat;
      background-size: cover;
      font-family: 'Tahoma', sans-serif;
      background-attachment: fixed;
    }

    #erdikoa {
      background-color: white;
      margin: 0 auto;
      width: 85%;
      max-width: 1300px;
      border-radius: 30px;
      border: 10px solid gainsboro;
      padding: 2%;
      box-sizing: border-box;
    }

    #arteak, #gizagizartezientziak, #dokumentuak, #zientziak {
      border-radius: 10px;
      padding: 1%;
      margin-bottom: 20px;
    }

    #arteak {
      background-color: #ffffff;
      flex:1;
    }

    #gizagizartezientziak {
      background-color: #ffffff;
      flex: 1;
    }

    #dokumentuak {
      background-color: #ffffff;
      flex: 1;
    }
    #zientziak {
      background-color: #ffffff;
      flex: 1;
      
    }

   

    /* Contenedor inferior (dos columnas en pantallas grandes) */
    .flex-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* Imagenes */
    img {
      /*max-width: 120px;*/
      height: auto;
      margin: 2px;
      transition: transform 0.4s ease, box-shadow 0.3s ease;
      cursor: pointer;
      
    }

    .lotura :hover {
      animation: igo-jaitsi 0.6s ease-in-out;
    }

    @keyframes igo-jaitsi {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    /* 🔹 Responsive: ajustar columnas en pantallas pequeñas */
    @media (max-width: 900px) {
      .flex-container {
        flex-direction: column;
      }

      #gizagizartezientziak, #dokumentuak {
        width: 100%;
      }

      img {
        max-width: 90px;
      }
    }

    @media (max-width: 600px) {
      img {
        max-width: 70px;
      }

      #erdikoa {
        padding: 5%;
      }
    }
  </style>
</head>
<body>
  
<div id="erdikoa">
  <a href="https://piobaroja.eus" target="_blank" rel="noopener noreferrer"><img src="pio_logoa_DEF_slogan.png"></a> 
  <div class="flex-container">
    <div id="gizagizartezientziak"> 
      <div id="izenburua">
         <a href="#" target="_blank" rel="noopener noreferrer" class="lotura"><img src="gizgizartez.png"></a></div>
    </div>
    <div id="zientziak"> 
      <div id="izenburua">
        <a href="#" target="_blank" rel="noopener noreferrer" class="lotura"><img src="zientziateknoz.png"></a></div>
   
     
    </div>
    <div id="arteak">
    
      
     
      
      <a href="#" class="lotura" target="_blank" rel="noopener noreferrer"><img src="arteak.png" class="lotura"></a>
     
      
    </div>
   
  </div>
      
  <div class="flex-container">
    <div id="gizagizartezientziak"> 
      
      
      
      <a href="#" target="_blank" rel="noopener noreferrer" class="lotura"><img src="socialeshuma.png"></a>
      
    </div>
    <div id="zientziak"> 
      
      
      <a href="#" target="_blank" rel="noopener noreferrer" class="lotura"><img src="cienciatecnologia.png"></a>
     
    </div>
    <div id="arteak">
      
      
     
      
      <a href="#" class="lotura" target="_blank" rel="noopener noreferrer"><img src="artes.png" class="lotura"></a>
     
      
    </div>
   
  </div>

</div>

</body>
</html>
